<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · BM Health Companion</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        text-align: center;
        padding: 1.5rem;
      }
      .badge {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: #0d9488;
        display: grid;
        place-items: center;
        color: #fff;
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #64748b; max-width: 22rem; }
      button {
        margin-top: 1.25rem;
        border: 0;
        background: #0f766e;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        padding: 0.85rem 1.5rem;
        border-radius: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="badge">✚</div>
    <h1>You're offline</h1>
    <p>
      Your health data is stored safely on this device. Reconnect to load the
      latest app, or reopen the app from your home screen — your logs are still
      there.
    </p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
